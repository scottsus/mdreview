name: Publish MCP to npm
run-name: "publish @scottsus/mdreview-mcp"

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build MCP package
        run: pnpm --filter @scottsus/mdreview-mcp build

      - name: Check if version bump needed
        id: version
        working-directory: packages/mcp
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @scottsus/mdreview-mcp version 2>/dev/null || echo "0.0.0")

          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm=$NPM_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r major minor patch <<< "$LOCAL_VERSION"
            NEW_VERSION="$major.$minor.$((patch + 1))"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json
        if: steps.version.outputs.bumped == 'true'
        working-directory: packages/mcp
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mcp/package.json
          git commit -m "v${{ steps.version.outputs.version }} (mcp)"
          git push

      - name: Publish to npm
        working-directory: packages/mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
